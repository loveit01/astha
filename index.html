<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    img {
      width: 90%;
      max-width: 300px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #ff4d88;
      animation: fadeIn 3s ease-in-out;
    }

    p {
      font-size: 1rem;
      color: #555;
      margin: 10px 0 20px;
      animation: fadeIn 4s ease-in-out;
    }

    #timer {
      font-size: 2rem;
      font-weight: bold;
      color: #ff4d88;
      margin: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #ff4d88;
      color: white;
      border: none;
      border-radius: 25px;
      display: none;
      animation: pop 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1;}
    }

    @keyframes pop {
      from {transform: scale(0);}
      to {transform: scale(1);}
    }
  </style>
</head>

<body>

<img src="gift.jpg" alt="Gift 🎁">

<h1>Something special is waiting for you 💖</h1>
<p>Just a little patience… your surprise is almost here ✨</p>

<div id="timer"></div>

<button id="enterBtn" onclick="goNext()">Open Your Surprise 🎁</button>

<script>

  const targetDate = new Date("June 30, 2026 00:00:00").getTime();

  const timer = setInterval(function() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    let seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("timer").innerHTML = seconds + "s";

    if (distance < 0) {
      clearInterval(timer);
      document.getElementById("timer").innerHTML = "It's time ❤️";
      document.getElementById("enterBtn").style.display = "block";
    }
  }, 1000);

  function goNext() {
    window.location.href = "cakes.html";
  }
</script>

</body>
</html>
